<!doctype html>
<html><head><meta charset="utf-8"><title>Brand · Product logos</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>

.wrap{padding:20px;display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.row{border:1px solid var(--pb-border);border-radius:10px;padding:16px;display:flex;align-items:center;gap:14px}
.l{font-family:'TT Firs Neue';font-weight:700;font-size:22px;color:#171719;white-space:nowrap}

</style></head><body><div class="wrap">
<div class="row"><div class="l">Data Clinic</div><div><div class="name">Data Clinic</div><div class="meta">Diagnosis Report · diagnostic</div></div></div>

<div class="row"><div class="l">Data Art Lab</div><div><div class="name">Data Art Lab</div><div class="meta">연구/전시 · research & art</div></div></div>
<div class="row"><div class="l" style="font-family:serif;font-style:italic;font-weight:500">Data Magazine</div><div><div class="name">Data Magazine</div><div class="meta">에디토리얼 · serif wordmark</div></div></div>
<div class="row" style="background:#171719;color:#fff;border-color:transparent"><img src="../assets/logos/pebblous-wordmark.svg" alt="Pebblous" style="height:18px;filter:invert(53%) sepia(79%) saturate(3008%) hue-rotate(354deg) brightness(100%) contrast(96%)"><div><div class="name" style="color:#fff">Parent brand</div><div class="meta" style="color:rgba(255,255,255,.6)">로고 그룹의 모기업</div></div></div>
</div></body></html>
