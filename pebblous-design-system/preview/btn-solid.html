<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons · Solid</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:var(--pb-bg-elevated);font-family:var(--pb-font-sans)}
.wrap{padding:24px;display:flex;flex-direction:column;gap:12px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.lab{font-size:11px;color:var(--pb-fg-muted);font-family:var(--pb-font-mono);width:64px}
.btn{font-family:var(--pb-font-sans);font-weight:600;border:0;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn.lg{height:48px;padding:0 20px;font-size:16px;border-radius:12px}
.btn.md{height:40px;padding:0 16px;font-size:14px;border-radius:10px}
.btn.sm{height:32px;padding:0 12px;font-size:13px;border-radius:8px}
.btn.primary{background:#F86825;color:#fff}
.btn.primary:hover{background:#C64900}
.btn.primary.press{background:#923401}
.btn.primary.dis{background:#FFDCCF;color:#FFB092;cursor:not-allowed}
.btn.dark{background:#171719;color:#fff}
</style></head><body><div class="wrap">
<div class="row"><div class="lab">large</div><button class="btn lg primary">Primary</button><button class="btn lg primary" style="background:#C64900">Hover</button><button class="btn lg primary press">Pressed</button><button class="btn lg primary dis" disabled>Disabled</button></div>
<div class="row"><div class="lab">medium</div><button class="btn md primary">Primary</button><button class="btn md dark">Dark</button><button class="btn md primary dis" disabled>Disabled</button></div>
<div class="row"><div class="lab">small</div><button class="btn sm primary">Primary</button><button class="btn sm dark">Dark</button></div>
</div></body></html>
