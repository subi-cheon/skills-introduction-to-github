<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Color · Accent</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--pb-bg-elevated);font-family:var(--pb-font-sans)}
  .wrap{padding:24px;display:flex;flex-direction:column;gap:14px}
  .hd{font-size:13px;font-weight:700}
  .sub{font-size:12px;color:var(--pb-fg-muted);font-weight:500}
  .scale{display:grid;grid-template-columns:repeat(11,1fr);border:1px solid var(--pb-border);border-radius:8px;overflow:hidden}
  .st{height:40px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:3px;font-size:9px;font-weight:700;font-family:var(--pb-font-mono)}
</style></head>
<body><div class="wrap">
  <div><div class="hd">Green <span class="sub">— data viz / charts</span></div></div>
  <div class="scale">
    <div class="st" style="background:#E4FFCF;color:#003223">99</div>
    <div class="st" style="background:#D1FFAA;color:#003223">90</div>
    <div class="st" style="background:#B8F77F;color:#003223">80</div>
    <div class="st" style="background:#A5E26B;color:#003223">60</div>
    <div class="st" style="background:#8CC850;color:#003223">50</div>
    <div class="st" style="background:#74AE33;color:#fff">40</div>
    <div class="st" style="background:#578856;color:#fff">30</div>
    <div class="st" style="background:#366351;color:#fff">20</div>
    <div class="st" style="background:#1F4D3C;color:#fff">10</div>
    <div class="st" style="background:#003223;color:#fff">0</div>
    <div class="st" style="background:#000;color:#fff">·</div>
  </div>
  <div><div class="hd">Violet <span class="sub">— secondary accent</span></div></div>
  <div class="scale">
    <div class="st" style="background:#E9E4FC;color:#6541F2">99</div>
    <div class="st" style="background:#CDC2F8;color:#6541F2">90</div>
    <div class="st" style="background:#B1A1F5;color:#fff">80</div>
    <div class="st" style="background:#A390F3;color:#fff">70</div>
    <div class="st" style="background:#8F78F0;color:#fff">60</div>
    <div class="st" style="background:#775FD5;color:#fff">50</div>
    <div class="st" style="background:#6541F2;color:#fff">40</div>
    <div class="st" style="background:#9747FF;color:#fff">★</div>
    <div class="st" style="background:#fff;color:#888">—</div>
    <div class="st" style="background:#fff;color:#888">—</div>
    <div class="st" style="background:#fff;color:#888">—</div>
  </div>
  <div><div class="hd">Red Pink <span class="sub">— soft destructive / highlights</span></div></div>
  <div class="scale">
    <div class="st" style="background:#FEF7F8;color:#DB4259">99</div>
    <div class="st" style="background:#FCDDE1;color:#DB4259">95</div>
    <div class="st" style="background:#F79AA5;color:#fff">90</div>
    <div class="st" style="background:#F36B7C;color:#fff">70</div>
    <div class="st" style="background:#F1576A;color:#fff">60</div>
    <div class="st" style="background:#DB4259;color:#fff">50</div>
    <div class="st" style="background:#fff;color:#888">—</div>
    <div class="st" style="background:#fff;color:#888">—</div>
    <div class="st" style="background:#fff;color:#888">—</div>
    <div class="st" style="background:#fff;color:#888">—</div>
    <div class="st" style="background:#fff;color:#888">—</div>
  </div>
</div></body></html>
