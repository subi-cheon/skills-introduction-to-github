<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Color · Neutral</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--pb-bg-elevated);font-family:var(--pb-font-sans)}
  .wrap{padding:24px;display:flex;flex-direction:column;gap:14px}
  .group{display:flex;flex-direction:column;gap:6px}
  .hd{font-size:13px;font-weight:700;color:var(--pb-fg);letter-spacing:-0.01em}
  .scale{display:grid;grid-template-columns:repeat(18,1fr);gap:0;border:1px solid var(--pb-border);border-radius:8px;overflow:hidden}
  .step{height:40px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:3px;font-size:9px;font-weight:700;font-family:var(--pb-font-mono)}
</style></head>
<body><div class="wrap">
  <div class="group">
    <div class="hd">Cool Neutral <span style="color:var(--pb-fg-muted);font-weight:500">— primary neutral ramp (text · surfaces · dividers)</span></div>
    <div class="scale">
      <div class="step" style="background:#F7F7F8;color:#46474C">99</div>
      <div class="step" style="background:#F4F4F5;color:#46474C">98</div>
      <div class="step" style="background:#EAEBEC;color:#46474C">97</div>
      <div class="step" style="background:#DBDCDF;color:#46474C">95</div>
      <div class="step" style="background:#C2C4C8;color:#171719">90</div>
      <div class="step" style="background:#AEB0B6;color:#171719">80</div>
      <div class="step" style="background:#989BA2;color:#fff">70</div>
      <div class="step" style="background:#878A93;color:#fff">60</div>
      <div class="step" style="background:#70737C;color:#fff">50</div>
      <div class="step" style="background:#5A5C63;color:#fff">40</div>
      <div class="step" style="background:#46474C;color:#fff">30</div>
      <div class="step" style="background:#2E2F33;color:#fff">22</div>
      <div class="step" style="background:#292A2D;color:#fff">20</div>
      <div class="step" style="background:#212225;color:#fff">17</div>
      <div class="step" style="background:#1B1C1E;color:#fff">15</div>
      <div class="step" style="background:#171719;color:#fff">10</div>
      <div class="step" style="background:#0F0F10;color:#fff">5</div>
      <div class="step" style="background:#000000;color:#fff">0</div>
    </div>
  </div>
  <div class="group">
    <div class="hd">Neutral <span style="color:var(--pb-fg-muted);font-weight:500">— warm grays for legacy / product surfaces</span></div>
    <div class="scale" style="grid-template-columns:repeat(14,1fr)">
      <div class="step" style="background:#F9F9F9;color:#222">95</div>
      <div class="step" style="background:#F7F7F7;color:#222">93</div>
      <div class="step" style="background:#F5F5F5;color:#222">90</div>
      <div class="step" style="background:#DCDCDC;color:#222">80</div>
      <div class="step" style="background:#DDDDDD;color:#222">70</div>
      <div class="step" style="background:#BDBDBD;color:#222">60</div>
      <div class="step" style="background:#808080;color:#fff">50</div>
      <div class="step" style="background:#737373;color:#fff">40</div>
      <div class="step" style="background:#585858;color:#fff">30</div>
      <div class="step" style="background:#474747;color:#fff">20</div>
      <div class="step" style="background:#333333;color:#fff">15</div>
      <div class="step" style="background:#222222;color:#fff">10</div>
      <div class="step" style="background:#0F0F0F;color:#fff">5</div>
      <div class="step" style="background:#000000;color:#fff">0</div>
    </div>
  </div>
</div></body></html>
