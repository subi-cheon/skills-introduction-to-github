<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:var(--pb-bg-elevated);font-family:var(--pb-font-sans)}
.wrap{padding:24px;display:flex;flex-direction:column;gap:10px}
.row{display:flex;align-items:center;gap:14px}
.tok{width:80px;font-size:12px;font-weight:700;font-family:var(--pb-font-mono)}
.bar{height:14px;background:var(--pb-primary);border-radius:4px}
.v{font-size:11px;color:var(--pb-fg-muted);font-family:var(--pb-font-mono);margin-left:8px}
</style></head><body><div class="wrap">
<div class="row"><div class="tok">space-1</div><div class="bar" style="width:4px"></div><div class="v">4px</div></div>
<div class="row"><div class="tok">space-2</div><div class="bar" style="width:8px"></div><div class="v">8px</div></div>
<div class="row"><div class="tok">space-3</div><div class="bar" style="width:12px"></div><div class="v">12px</div></div>
<div class="row"><div class="tok">space-4</div><div class="bar" style="width:16px"></div><div class="v">16px</div></div>
<div class="row"><div class="tok">space-6</div><div class="bar" style="width:24px"></div><div class="v">24px</div></div>
<div class="row"><div class="tok">space-8</div><div class="bar" style="width:32px"></div><div class="v">32px</div></div>
<div class="row"><div class="tok">space-12</div><div class="bar" style="width:48px"></div><div class="v">48px</div></div>
<div class="row"><div class="tok">space-16</div><div class="bar" style="width:64px"></div><div class="v">64px · 섹션 gap</div></div>
<div class="row"><div class="tok">space-20</div><div class="bar" style="width:80px"></div><div class="v">80px</div></div>
</div></body></html>
