<!doctype html>
<html><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:var(--pb-bg-elevated);font-family:var(--pb-font-sans)}
.wrap{padding:30px;display:grid;grid-template-columns:repeat(4,1fr);gap:24px}
.b{background:#fff;border-radius:16px;aspect-ratio:1.3/1;display:flex;align-items:flex-end;padding:12px;font-size:11px;font-family:var(--pb-font-mono);font-weight:700;color:var(--pb-fg-muted)}
</style></head><body><div class="wrap">
<div class="b" style="box-shadow:0 1px 2px rgba(0,0,0,0.04)">shadow-1 · hover</div>
<div class="b" style="box-shadow:0 2px 8px rgba(0,0,0,0.04),0 1px 2px rgba(0,0,0,0.03)">shadow-2 · card</div>
<div class="b" style="box-shadow:0 8px 24px rgba(0,0,0,0.08),0 2px 6px rgba(0,0,0,0.04)">shadow-3 · popover</div>
<div class="b" style="box-shadow:0 16px 48px rgba(0,0,0,0.12),0 4px 12px rgba(0,0,0,0.04)">shadow-4 · modal</div>
</div></body></html>
