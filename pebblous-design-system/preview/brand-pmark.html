<!doctype html>
<html><head><meta charset="utf-8"><title>Brand · P-mark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:var(--pb-bg-elevated);font-family:var(--pb-font-sans)}
.wrap{padding:24px;display:flex;gap:18px;align-items:center;flex-wrap:wrap}
.tile{display:flex;flex-direction:column;align-items:center;gap:8px}
.p{width:84px;height:84px;border-radius:22px;display:flex;align-items:center;justify-content:center;font-family:'TT Firs Neue';font-weight:700;font-size:52px;line-height:1}
.l{font-size:11px;color:var(--pb-fg-muted);font-family:var(--pb-font-mono)}
.meta{flex:1;min-width:220px;padding-left:10px;border-left:3px solid var(--pb-primary)}
.h{font-size:14px;font-weight:700}
.d{font-size:12px;color:var(--pb-fg-muted);line-height:1.5;margin-top:4px}
</style></head><body><div class="wrap">
<div class="tile"><div class="p" style="background:#F86825;color:#fff">P</div><div class="l">Primary</div></div>
<div class="tile"><div class="p" style="background:#FFF0E6;color:#F86825">P</div><div class="l">Soft</div></div>
<div class="tile"><div class="p" style="background:#171719;color:#F86825">P</div><div class="l">Dark</div></div>
<div class="tile"><div class="p" style="background:#FFFFFF;color:#171719;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.12)">P</div><div class="l">Mono</div></div>
<div class="meta"><div class="h">Pebblous P-mark</div><div class="d">기본 favicon / app icon 용도. 둥근 페블 실루엣이 포함된 단일 문자 P. minimum 24px, never skew, never re-color outside the palette shown here.</div></div>
</div></body></html>
