<!doctype html>
<html><head><meta charset="utf-8"><title>Feedback</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:var(--pb-bg-elevated);font-family:var(--pb-font-sans);color:var(--pb-fg)}
.wrap{padding:22px;display:flex;flex-direction:column;gap:10px}
.al{display:flex;gap:10px;align-items:flex-start;padding:12px 14px;border-radius:12px;font-size:13px;line-height:1.5}
.ic{width:20px;height:20px;border-radius:50%;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:12px}
.t{font-weight:700;margin-bottom:2px}
.pg{height:6px;background:#EAEBEC;border-radius:999px;overflow:hidden}
.pg>span{display:block;height:100%;background:#F86825;width:64%}
.sp{width:22px;height:22px;border:3px solid #FFDCCF;border-top-color:#F86825;border-radius:50%;animation:sp .9s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
</style></head><body><div class="wrap">
<div class="al" style="background:#F2FFF6;color:#1F4D3C"><span class="ic" style="background:#32AC62">✓</span><div><div class="t">업로드 완료</div>156개 파일이 정상적으로 처리되었습니다.</div></div>
<div class="al" style="background:#FCF4F3;color:#7A1A1A"><span class="ic" style="background:#E53935">!</span><div><div class="t">연결 실패</div>네트워크를 확인한 후 다시 시도해주세요.</div></div>
<div class="al" style="background:#FFF3D9;color:#7A5500"><span class="ic" style="background:#DDA200">i</span><div><div class="t">검수 대기</div>관리자의 승인이 필요합니다.</div></div>
<div class="al" style="background:#E7F1FC;color:#002953"><span class="ic" style="background:#0066FF">i</span><div><div class="t">새 버전 · v2.4</div>개선된 리포트 템플릿이 적용되었습니다.</div></div>
<div style="display:flex;align-items:center;gap:10px;padding:4px 2px"><span class="sp"></span><div style="flex:1"><div style="font-size:12px;color:var(--pb-fg-muted);margin-bottom:4px">모델 학습 · 64%</div><div class="pg"><span></span></div></div></div>
</div></body></html>
