<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:var(--pb-bg-elevated);font-family:var(--pb-font-sans)}
.wrap{padding:24px;display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end}
.t{display:flex;flex-direction:column;gap:6px;align-items:center}
.sq{width:80px;height:80px;background:#EAEBEC;border:1px solid var(--pb-border)}
.tok{font-size:11px;font-family:var(--pb-font-mono);font-weight:700;color:var(--pb-fg-2)}
.v{font-size:10px;color:var(--pb-fg-muted);font-family:var(--pb-font-mono)}
</style></head><body><div class="wrap">
<div class="t"><div class="sq" style="border-radius:4px"></div><div class="tok">xs</div><div class="v">4px</div></div>
<div class="t"><div class="sq" style="border-radius:8px"></div><div class="tok">sm</div><div class="v">8px</div></div>
<div class="t"><div class="sq" style="border-radius:12px"></div><div class="tok">md</div><div class="v">12px</div></div>
<div class="t"><div class="sq" style="border-radius:16px"></div><div class="tok">lg</div><div class="v">16px</div></div>
<div class="t"><div class="sq" style="border-radius:24px"></div><div class="tok">xl</div><div class="v">24px</div></div>
<div class="t"><div class="sq" style="border-radius:32px"></div><div class="tok">2xl</div><div class="v">32px · cards</div></div>
<div class="t"><div class="sq" style="border-radius:64px"></div><div class="tok">3xl</div><div class="v">64px · sections</div></div>
<div class="t"><div class="sq" style="border-radius:9999px"></div><div class="tok">full</div><div class="v">pill</div></div>
</div></body></html>
